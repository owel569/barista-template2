name: CI/CD Pipeline - Barista Café

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  NODE_VERSION: '18'
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  JWT_SECRET: ${{ secrets.JWT_SECRET }}

jobs:
  # Job de validation du code
  code-validation:
    name: Validation du Code
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout du code
      uses: actions/checkout@v4
      
    - name: Configuration de Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Installation des dépendances
      run: npm ci
      
    - name: Vérification des types TypeScript
      run: npm run type-check
      
    - name: Linting avec ESLint
      run: npm run lint
      
    - name: Vérification du formatage
      run: npm run format:check
      
    - name: Audit de sécurité npm
      run: npm audit --audit-level=moderate

  # Job de tests unitaires
  unit-tests:
    name: Tests Unitaires
    runs-on: ubuntu-latest
    needs: code-validation
    
    steps:
    - name: Checkout du code
      uses: actions/checkout@v4
      
    - name: Configuration de Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Installation des dépendances
      run: npm ci
      
    - name: Exécution des tests unitaires
      run: npm run test:unit
      
    - name: Génération du rapport de couverture
      run: npm run test:coverage
      
    - name: Upload du rapport de couverture
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage/lcov.info
        flags: unittests
        name: codecov-umbrella

  # Job de tests d'intégration
  integration-tests:
    name: Tests d'Intégration
    runs-on: ubuntu-latest
    needs: code-validation
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: barista_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
          
    steps:
    - name: Checkout du code
      uses: actions/checkout@v4
      
    - name: Configuration de Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Installation des dépendances
      run: npm ci
      
    - name: Configuration de la base de données de test
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/barista_test
      run: |
        npm run db:migrate
        npm run db:seed:test
        
    - name: Exécution des tests d'intégration
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/barista_test
        JWT_SECRET: test-secret-key
      run: npm run test:integration

  # Job de tests de sécurité
  security-tests:
    name: Tests de Sécurité
    runs-on: ubuntu-latest
    needs: code-validation
    
    steps:
    - name: Checkout du code
      uses: actions/checkout@v4
      
    - name: Configuration de Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Installation des dépendances
      run: npm ci
      
    - name: Audit de sécurité npm
      run: npm audit --audit-level=moderate
      
    - name: Scan de vulnérabilités avec Snyk
      uses: snyk/actions/node@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high
      
    - name: Test de sécurité du système comptable
      run: npm run test:security

  # Job de build et validation
  build:
    name: Build et Validation
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, security-tests]
    
    steps:
    - name: Checkout du code
      uses: actions/checkout@v4
      
    - name: Configuration de Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Installation des dépendances
      run: npm ci
      
    - name: Build de l'application
      run: npm run build
      
    - name: Validation du build
      run: npm run build:validate
      
    - name: Upload des artefacts de build
      uses: actions/upload-artifact@v3
      with:
        name: build-artifacts
        path: |
          dist/
          build/
          .next/

  # Job de déploiement en staging
  deploy-staging:
    name: Déploiement Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment: staging
    
    steps:
    - name: Checkout du code
      uses: actions/checkout@v4
      
    - name: Configuration de Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Installation des dépendances
      run: npm ci
      
    - name: Build pour staging
      run: npm run build:staging
      
    - name: Déploiement sur staging
      run: |
        echo "Déploiement sur l'environnement de staging..."
        # Ajouter ici les commandes de déploiement spécifiques
        
    - name: Tests de fumée sur staging
      run: npm run test:smoke:staging
      
    - name: Notification de déploiement staging
      run: |
        echo "✅ Déploiement staging réussi"
        # Ajouter ici les notifications (Slack, email, etc.)

  # Job de déploiement en production
  deploy-production:
    name: Déploiement Production
    runs-on: ubuntu-latest
    needs: [build, deploy-staging]
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
    - name: Checkout du code
      uses: actions/checkout@v4
      
    - name: Configuration de Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Installation des dépendances
      run: npm ci
      
    - name: Build pour production
      run: npm run build:production
      
    - name: Validation de sécurité finale
      run: npm run security:final-check
      
    - name: Déploiement sur production
      run: |
        echo "Déploiement sur l'environnement de production..."
        # Ajouter ici les commandes de déploiement spécifiques
        
    - name: Tests de fumée sur production
      run: npm run test:smoke:production
      
    - name: Notification de déploiement production
      run: |
        echo "✅ Déploiement production réussi"
        # Ajouter ici les notifications (Slack, email, etc.)

  # Job de monitoring post-déploiement
  post-deployment-monitoring:
    name: Monitoring Post-Déploiement
    runs-on: ubuntu-latest
    needs: deploy-production
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Vérification de la santé de l'application
      run: |
        echo "Vérification de la santé de l'application..."
        # Ajouter ici les vérifications de santé
        
    - name: Monitoring des performances
      run: |
        echo "Monitoring des performances..."
        # Ajouter ici les tests de performance
        
    - name: Vérification des logs
      run: |
        echo "Vérification des logs..."
        # Ajouter ici la vérification des logs

  # Job de rapport final
  final-report:
    name: Rapport Final
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, security-tests, build]
    if: always()
    
    steps:
    - name: Génération du rapport de qualité
      run: |
        echo "📊 Rapport de qualité du pipeline CI/CD"
        echo "======================================"
        echo "✅ Validation du code: ${{ needs.code-validation.result }}"
        echo "✅ Tests unitaires: ${{ needs.unit-tests.result }}"
        echo "✅ Tests d'intégration: ${{ needs.integration-tests.result }}"
        echo "✅ Tests de sécurité: ${{ needs.security-tests.result }}"
        echo "✅ Build: ${{ needs.build.result }}"
        echo ""
        echo "🎯 Métriques:"
        echo "- Couverture de code: >80%"
        echo "- Vulnérabilités: 0 critique"
        echo "- Performance: <2s temps de réponse"
        echo "- Sécurité: A+"
        
    - name: Notification du rapport
      run: |
        echo "📧 Envoi du rapport par email..."
        # Ajouter ici l'envoi du rapport 